<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — NutriPlan Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: radial-gradient(circle at 30% 20%, #0c1a13 0%, #030504 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }
        .auth-card {
            background: rgba(10,18,12,0.85);
            border: 1px solid rgba(0,255,102,0.15);
            box-shadow: 0 0 60px rgba(0,255,102,0.06), 0 24px 48px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
        }
        .input-field {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.10);
            color: #fff;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(0,255,102,0.5);
            box-shadow: 0 0 0 3px rgba(0,255,102,0.08);
        }
        .btn-primary {
            background: #00ff66;
            color: #000;
            font-weight: 900;
            transition: background .2s, box-shadow .2s, transform .1s;
        }
        .btn-primary:hover { background: #00e55c; box-shadow: 0 0 30px rgba(0,255,102,0.35); }
        .btn-primary:active { transform: scale(.97); }
        .error-box { background: rgba(255,55,95,0.10); border: 1px solid rgba(255,55,95,0.25); }
        .success-box { background: rgba(0,255,102,0.08); border: 1px solid rgba(0,255,102,0.25); }

        /* slide-up */
        @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
        .slide-up { animation: slideUp .5s cubic-bezier(.16,1,.3,1) forwards; }

        /* password strength bar */
        #strength-bar { height: 3px; border-radius: 9px; transition: width .4s, background .4s; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Background orbs -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-1/4 left-1/4 w-96 h-96 rounded-full opacity-5" style="background:radial-gradient(circle,#00ff66,transparent);filter:blur(60px);"></div>
        <div class="absolute bottom-1/4 right-1/4 w-80 h-80 rounded-full opacity-4" style="background:radial-gradient(circle,#00f0ff,transparent);filter:blur(60px);"></div>
    </div>

    <div class="w-full max-w-md slide-up">

        <!-- Brand -->
        <a href="index.html" class="flex items-center justify-center gap-2 mb-8 group no-underline">
            <div class="relative">
                <i class="fas fa-leaf text-[#00ff66] text-2xl drop-shadow-[0_0_10px_rgba(0,255,102,0.5)] group-hover:scale-110 transition-transform"></i>
                <span class="absolute -top-1 -right-1 w-2 h-2 rounded-full bg-[#00ff66] opacity-70 animate-ping"></span>
            </div>
            <span class="text-2xl font-extrabold tracking-tight text-white">NutriPlan <span class="bg-gradient-to-r from-[#00ff66] to-[#00f0ff] bg-clip-text text-transparent">Lite</span></span>
        </a>

        <div class="auth-card rounded-3xl p-8 space-y-6">

            <!-- Header -->
            <div class="text-center space-y-1">
                <div class="w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center"
                     style="background:linear-gradient(135deg,rgba(0,255,102,0.15),rgba(0,240,255,0.10));border:1px solid rgba(0,255,102,0.3);">
                    <i class="fas fa-user-plus text-xl" style="background:linear-gradient(135deg,#00ff66,#00f0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></i>
                </div>
                <h1 class="text-2xl font-black text-white tracking-tight">Create your account</h1>
                <p class="text-sm text-white/40">Start your personalised nutrition journey</p>
            </div>

            <!-- Error / Success -->
            <div id="msg-box" class="hidden rounded-xl px-4 py-3 text-sm font-semibold flex items-center gap-2">
                <i id="msg-icon" class="text-sm shrink-0"></i>
                <span id="msg-text"></span>
            </div>

            <!-- Form -->
            <form id="signup-form" class="space-y-4" onsubmit="handleSignup(event)">

                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-black tracking-widest text-white/50">Full Name</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-white/25 text-xs"></i>
                        <input id="su-name" type="text" placeholder="Jane Smith" required
                            class="input-field w-full rounded-xl pl-10 pr-4 py-3.5 text-sm">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-black tracking-widest text-white/50">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-white/25 text-xs"></i>
                        <input id="su-email" type="email" placeholder="jane@example.com" required
                            class="input-field w-full rounded-xl pl-10 pr-4 py-3.5 text-sm">
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-black tracking-widest text-white/50">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/25 text-xs"></i>
                        <input id="su-password" type="password" placeholder="Min 6 characters" required minlength="6"
                            class="input-field w-full rounded-xl pl-10 pr-12 py-3.5 text-sm"
                            oninput="updateStrength(this.value)">
                        <button type="button" onclick="togglePwd('su-password', this)"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/70 transition-colors">
                            <i class="fas fa-eye text-xs"></i>
                        </button>
                    </div>
                    <!-- Strength bar -->
                    <div class="w-full bg-white/5 rounded-full overflow-hidden mt-1.5">
                        <div id="strength-bar" style="width:0%;background:#ff375f;"></div>
                    </div>
                    <p id="strength-label" class="text-[10px] text-white/30 font-semibold"></p>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-black tracking-widest text-white/50">Confirm Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/25 text-xs"></i>
                        <input id="su-confirm" type="password" placeholder="Repeat password" required
                            class="input-field w-full rounded-xl pl-10 pr-12 py-3.5 text-sm">
                        <button type="button" onclick="togglePwd('su-confirm', this)"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/70 transition-colors">
                            <i class="fas fa-eye text-xs"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="su-btn" class="btn-primary w-full rounded-xl py-4 text-sm uppercase tracking-widest mt-2">
                    <i class="fas fa-sparkles mr-2"></i>Create Account
                </button>
            </form>

            <p class="text-center text-sm text-white/40">
                Already have an account?
                <a href="login.html" class="text-[#00ff66] font-black hover:underline ml-1">Log In</a>
            </p>

        </div>

        <p class="text-center text-[10px] text-white/20 mt-6">© <span id="yr"></span> NutriPlan Lite. All rights reserved.</p>
    </div>

    <script src="script/auth.js"></script>
    <script>
        document.getElementById('yr').textContent = new Date().getFullYear();

        function handleSignup(e) {
            e.preventDefault();
            const name     = document.getElementById('su-name').value.trim();
            const email    = document.getElementById('su-email').value.trim().toLowerCase();
            const password = document.getElementById('su-password').value;
            const confirm  = document.getElementById('su-confirm').value;

            if (password !== confirm) {
                showMsg('error', "Passwords don't match. Please try again.");
                return;
            }
            if (password.length < 6) {
                showMsg('error', 'Password must be at least 6 characters.');
                return;
            }

            const btn = document.getElementById('su-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>Creating account...';

            setTimeout(async () => {
                const result = await signUp(name, email, password);
                if (result.ok) {
                    showMsg('success', `Welcome, ${name}! Redirecting you home...`);
                    setTimeout(() => window.location.href = 'index.html', 1200);
                } else {
                    showMsg('error', result.msg);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sparkles mr-2"></i>Create Account';
                }
            }, 600);
        }

        function showMsg(type, text) {
            const box  = document.getElementById('msg-box');
            const icon = document.getElementById('msg-icon');
            const msg  = document.getElementById('msg-text');
            box.className = 'rounded-xl px-4 py-3 text-sm font-semibold flex items-center gap-2 ' +
                (type === 'error' ? 'error-box text-[#ff375f]' : 'success-box text-[#00ff66]');
            icon.className = 'text-sm shrink-0 fas ' + (type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check');
            msg.textContent = text;
            box.classList.remove('hidden');
        }

        function togglePwd(id, btn) {
            const input = document.getElementById(id);
            const isText = input.type === 'text';
            input.type = isText ? 'password' : 'text';
            btn.querySelector('i').className = 'fas text-xs ' + (isText ? 'fa-eye' : 'fa-eye-slash');
        }

        function updateStrength(val) {
            const bar   = document.getElementById('strength-bar');
            const label = document.getElementById('strength-label');
            let score = 0;
            if (val.length >= 6)  score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const levels = [
                { pct:'0%',   col:'#ff375f', text:'' },
                { pct:'20%',  col:'#ff375f', text:'Very Weak' },
                { pct:'40%',  col:'#ff9f0a', text:'Weak' },
                { pct:'60%',  col:'#ff9f0a', text:'Fair' },
                { pct:'80%',  col:'#00ff66', text:'Strong' },
                { pct:'100%', col:'#00ff66', text:'Very Strong' },
            ];
            const lv = levels[score] || levels[0];
            bar.style.width      = lv.pct;
            bar.style.background = lv.col;
            label.textContent    = lv.text;
            label.style.color    = lv.col;
        }
    </script>
</body>
</html>
