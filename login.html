<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — NutriPlan Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: radial-gradient(circle at 70% 20%, #0c1a13 0%, #030504 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }
        .auth-card {
            background: rgba(10,18,12,0.85);
            border: 1px solid rgba(0,255,102,0.15);
            box-shadow: 0 0 60px rgba(0,255,102,0.06), 0 24px 48px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
        }
        .input-field {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.10);
            color: #fff;
            transition: border-color .2s, box-shadow .2s;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(0,255,102,0.5);
            box-shadow: 0 0 0 3px rgba(0,255,102,0.08);
        }
        .btn-primary {
            background: #00ff66;
            color: #000;
            font-weight: 900;
            transition: background .2s, box-shadow .2s, transform .1s;
        }
        .btn-primary:hover { background: #00e55c; box-shadow: 0 0 30px rgba(0,255,102,0.35); }
        .btn-primary:active { transform: scale(.97); }
        .error-box   { background: rgba(255,55,95,0.10); border: 1px solid rgba(255,55,95,0.25); }
        .success-box { background: rgba(0,255,102,0.08); border: 1px solid rgba(0,255,102,0.25); }

        @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:none} }
        .slide-up { animation: slideUp .5s cubic-bezier(.16,1,.3,1) forwards; }

        /* shake animation on error */
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%,60%{transform:translateX(-6px)}
            40%,80%{transform:translateX(6px)}
        }
        .shake { animation: shake .4s ease; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Background orbs -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="absolute top-1/4 right-1/4 w-96 h-96 rounded-full opacity-5" style="background:radial-gradient(circle,#00ff66,transparent);filter:blur(60px);"></div>
        <div class="absolute bottom-1/4 left-1/4 w-72 h-72 rounded-full opacity-4" style="background:radial-gradient(circle,#00f0ff,transparent);filter:blur(60px);"></div>
    </div>

    <div class="w-full max-w-md slide-up">

        <!-- Brand -->
        <a href="index.html" class="flex items-center justify-center gap-2 mb-8 group no-underline">
            <div class="relative">
                <i class="fas fa-leaf text-[#00ff66] text-2xl drop-shadow-[0_0_10px_rgba(0,255,102,0.5)] group-hover:scale-110 transition-transform"></i>
                <span class="absolute -top-1 -right-1 w-2 h-2 rounded-full bg-[#00ff66] opacity-70 animate-ping"></span>
            </div>
            <span class="text-2xl font-extrabold tracking-tight text-white">NutriPlan <span class="bg-gradient-to-r from-[#00ff66] to-[#00f0ff] bg-clip-text text-transparent">Lite</span></span>
        </a>

        <div class="auth-card rounded-3xl p-8 space-y-6">

            <!-- Header -->
            <div class="text-center space-y-1">
                <div class="w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center"
                     style="background:linear-gradient(135deg,rgba(0,255,102,0.15),rgba(0,240,255,0.10));border:1px solid rgba(0,255,102,0.3);">
                    <i class="fas fa-right-to-bracket text-xl" style="background:linear-gradient(135deg,#00ff66,#00f0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;"></i>
                </div>
                <h1 class="text-2xl font-black text-white tracking-tight">Welcome back</h1>
                <p class="text-sm text-white/40">Log in to access your nutrition plan</p>
            </div>

            <!-- Error / Success -->
            <div id="msg-box" class="hidden rounded-xl px-4 py-3 text-sm font-semibold flex items-center gap-2">
                <i id="msg-icon" class="text-sm shrink-0"></i>
                <span id="msg-text"></span>
            </div>

            <!-- Form -->
            <form id="login-form" class="space-y-4" onsubmit="handleLogin(event)">

                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-black tracking-widest text-white/50">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-white/25 text-xs"></i>
                        <input id="li-email" type="email" placeholder="jane@example.com" required
                            class="input-field w-full rounded-xl pl-10 pr-4 py-3.5 text-sm">
                    </div>
                </div>

                <div class="space-y-1">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] uppercase font-black tracking-widest text-white/50">Password</label>
                        <a href="#" onclick="showForgot()" class="text-[10px] text-[#00ff66]/70 hover:text-[#00ff66] font-semibold transition-colors">Forgot password?</a>
                    </div>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-white/25 text-xs"></i>
                        <input id="li-password" type="password" placeholder="Your password" required
                            class="input-field w-full rounded-xl pl-10 pr-12 py-3.5 text-sm">
                        <button type="button" onclick="togglePwd('li-password', this)"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/70 transition-colors">
                            <i class="fas fa-eye text-xs"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember me -->
                <label class="flex items-center gap-2.5 cursor-pointer select-none group">
                    <input type="checkbox" id="remember" class="w-4 h-4 rounded accent-[#00ff66] cursor-pointer">
                    <span class="text-xs text-white/50 group-hover:text-white/70 transition-colors">Keep me logged in</span>
                </label>

                <button type="submit" id="li-btn" class="btn-primary w-full rounded-xl py-4 text-sm uppercase tracking-widest">
                    <i class="fas fa-right-to-bracket mr-2"></i>Log In
                </button>
            </form>

            <p class="text-center text-sm text-white/40">
                Don't have an account?
                <a href="signup.html" class="text-[#00ff66] font-black hover:underline ml-1">Sign Up Free</a>
            </p>

        </div>

        <p class="text-center text-[10px] text-white/20 mt-6">© <span id="yr"></span> NutriPlan Lite. All rights reserved.</p>
    </div>

    <script src="script/auth.js"></script>
    <script>
        document.getElementById('yr').textContent = new Date().getFullYear();

        // Redirect already-logged-in users
        if (isLoggedIn()) window.location.href = 'index.html';

        function handleLogin(e) {
            e.preventDefault();
            const email    = document.getElementById('li-email').value.trim().toLowerCase();
            const password = document.getElementById('li-password').value;
            const btn      = document.getElementById('li-btn');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>Logging in...';

            setTimeout(async () => {
                const result = await login(email, password);
                if (result.ok) {
                    showMsg('success', `Welcome back! Taking you home...`);
                    setTimeout(() => {
                        const dest = localStorage.getItem('np_after_login') || 'index.html';
                        localStorage.removeItem('np_after_login');
                        window.location.href = dest;
                    }, 900);
                } else {
                    showMsg('error', result.msg);
                    // shake the form
                    const form = document.getElementById('login-form');
                    form.classList.add('shake');
                    form.addEventListener('animationend', () => form.classList.remove('shake'), { once: true });

                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-right-to-bracket mr-2"></i>Log In';
                }
            }, 500);
        }

        function showMsg(type, text) {
            const box  = document.getElementById('msg-box');
            const icon = document.getElementById('msg-icon');
            const msg  = document.getElementById('msg-text');
            box.className = 'rounded-xl px-4 py-3 text-sm font-semibold flex items-center gap-2 ' +
                (type === 'error' ? 'error-box text-[#ff375f]' : 'success-box text-[#00ff66]');
            icon.className = 'text-sm shrink-0 fas ' + (type === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check');
            msg.textContent = text;
            box.classList.remove('hidden');
        }

        function togglePwd(id, btn) {
            const input = document.getElementById(id);
            const isText = input.type === 'text';
            input.type = isText ? 'password' : 'text';
            btn.querySelector('i').className = 'fas text-xs ' + (isText ? 'fa-eye' : 'fa-eye-slash');
        }

        function showForgot() {
            showMsg('error', 'Password reset is not available in this demo. Contact support or create a new account.');
        }
    </script>
</body>
</html>
