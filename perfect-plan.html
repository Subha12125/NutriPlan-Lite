    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: radial-gradient(circle at center, #0c1a13 0%, #030504 100%) !important;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }
        /* Custom slide-up animation */
        .slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

<body class="p-4 md:p-8 flex flex-col justify-center items-center min-h-screen">

                    </span>

                </h2>
                <div id="meal-plan-container" class="space-y-4">
                    <!-- Dynamic Meals -->

            </section>

            <!-- Workout Section -->

                </h2>
                <div id="workout-routine-container" class="grid gap-4 md:grid-cols-1">
                    <!-- Dynamic Workout Steps -->

            </section>
        </main>

                Close Report Tab

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const identity = urlParams.get('identity') || 'women';
            const goal = urlParams.get('goal') || 'lose';
            const bodytype = urlParams.get('bodytype') || 'mesomorph';

            // Resolve data
            const genderData = perfectDatabase[identity] || perfectDatabase.women;
            const data = genderData[bodytype] || genderData.mesomorph;

            // Populate text indicators
            document.getElementById('profile-indicator').innerText = data.title;
            document.getElementById('goal-indicator').innerText = goal === 'lose' ? 'Lose Fat' : goal;
            document.getElementById('bodytype-indicator').innerText = data.bodyTitle;
            document.getElementById('bodytype-desc').innerText = data.desc;

            // Populate meals
            const mealContainer = document.getElementById('meal-plan-container');
            data.mealPlan.forEach(item => {
                const card = document.createElement('div');
                card.className = "flex flex-col sm:flex-row sm:items-center gap-4 bg-white/5 border border-white/10 hover:border-[#00ff66]/30 p-5 rounded-2xl transition-all duration-300 group";

                    </div>
                    <div class="flex-1 text-slate-300 text-xs leading-relaxed">

                    </div>
